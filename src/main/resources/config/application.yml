spring:
  thymeleaf:
    encoding: UTF-8
    prefix: classpath:/templates/
  mvc:
    static-path-pattern: /static/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://odyseja.eu.auth0.com/
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
  application:
    name: odyseja
  #-------------------------------------------------------------------------------------------------
  # DATABASE
  #-------------------------------------------------------------------------------------------------
  datasource:
    # Postgres database
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:24889/odyseja
    username: odyseja
    password: odyseja
  sql:
    init:
      mode: never
server:
  port: 8081

